coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

flags:
  php-unit:
    carryforward: true
  php-integration:
    carryforward: true
  js-unit:
    carryforward: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
