# Builds a distributable plugin zip from this branch and uploads it as a GitHub Actions artifact.
name: Build Plugin Zip

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/fix-dashboard-background-issue

permissions:
  contents: read

jobs:
  build:
    name: Build ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies & build assets
        shell: bash
        run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build:prod

      - name: Package plugin zip
        shell: bash
        run: |
          mkdir -p /tmp/godam/godam
          rsync -rc --exclude-from=".distignore" . /tmp/godam/godam/
          cd /tmp/godam
          zip -r -q "${{ github.workspace }}/godam.zip" godam/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godam
          path: ${{ github.workspace }}/godam.zip
          retention-days: 7
