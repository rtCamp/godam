name: Build Plugin Zip

on:
  workflow_dispatch:
  push:
    branches:
      - copilot/fix-dashboard-background-issue

permissions:
  contents: read

jobs:
  build:
    name: Build ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies & build assets
        shell: bash
        run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build:prod

      - name: WordPress Plugin Deploy (generate zip only)
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@2.3.0
        with:
          generate-zip: 'true'
          dry-run: 'true'
        env:
          SLUG: 'godam'
          ASSETS_DIR: 'wp-assets'
          SVN_USERNAME: 'placeholder'
          SVN_PASSWORD: 'placeholder'
          VERSION: '${{ github.ref_name }}'

      - name: Repack as installable zip
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/plugin-extract"
          unzip -q "${{ steps.deploy.outputs.zip-path }}" -d "${{ runner.temp }}/plugin-extract"
          cd "${{ runner.temp }}/plugin-extract"
          zip -r -q "${{ github.workspace }}/godam.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: godam
          path: '${{ github.workspace }}/godam.zip'
          retention-days: 7
