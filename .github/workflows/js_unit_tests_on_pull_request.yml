on:
  pull_request:
    branches:
      - develop
      - main

name: JS Unit Tests

permissions:
  contents: read

jobs:
  runJSUnitTests:
    name: Run JS unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Runs Jest via @wordpress/scripts. `--passWithNoTests` (baked into the
      # test:unit script) keeps this green until the first suites land
      # (tracked in #1923); once tests exist they run and must pass.
      - name: Run JS unit tests
        run: npm run test:unit
